<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      //1. Function declaration syntax
      //   function PrintPerson() {
      //     console.log("I am a person !");
      //   }

      //   PrintPerson();

      function Add(x, y) {
        return x + y;
      }
      console.log("The result is " + Add(10, 30));

      // 2. Using Function as an expression
      // console.log(Person); // undefined

      //   Person(); // Error as only Person variable gets hoisted and not the entire function
      //   var Person = function () {
      //     console.log("I am a person !");
      //   };

      //3. Using Function object

      //   var Add = new Function("x", "y", "return x + y");
      //   console.log("The result is " + Add(10, 30));

      //4. ES6 -> Arrow Function (Lambdas)

      var Add = function (x, y) {
        return x + y;
      };
      // OR (Arrow Function)

      var Add = (x, y) => {
        return x + y;
      };

      // OR (Optimized)
      var Add = (x, y) => x + y;
    </script>
  </head>

</html>
