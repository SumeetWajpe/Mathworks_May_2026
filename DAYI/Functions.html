    <script>

      //3. Using Function object

      //   var Add = new Function("x", "y", "return x + y");
      //   console.log("The result is " + Add(10, 30));

      //4. ES6 -> Arrow Function (Lambdas)

      //   var Add = function (x, y) {
      //     return x + y;
      //   };
      //   // OR (Arrow Function)

      //   var Add = (x, y) => {
      //     return x + y;
      //   };

      // OR (Optimized)

      var Add = (x, y) => x + y;
      console.log("The result is " + Add(40, 30));

      //   function PrintBook(title, author, noOfPages) {
      //     console.log(title, author, noOfPages);
      //   }

      //   PrintBook("Pavankhind", "Ranjit Desai", 200);

      // OR

      var PrintBook = (title, author, noOfPages) =>
        console.log(title, author, noOfPages);
      PrintBook("Pavankhind", "Ranjit Desai", 200);

      //   function Test() {
      //     return "Testing 1 2 3..";
      //   }

      var Test = () => "Testing 1 2 3.."; // with no parameter list

      // IIFE - Immediately invocable function expression
      // 1. Its executed only once
      // 2. Initialization logic can go in an IIFE (Loading of the webpage)
      // 3.

      // Simple IIFE

      (function () {
        console.log("IIFE..");
      })();

      // IIFE with parameter
      (function (msg) {
        console.log(msg);
      })("IIFE invoked!");
    </script>
