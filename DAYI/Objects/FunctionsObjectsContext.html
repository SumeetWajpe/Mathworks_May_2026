<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      var person = {
        name: "Novak",
        greeting: function (theGreeting) {
          console.log(theGreeting + " " + this.name + " !");
        },
      };

      person.greeting("Hey");

      var anotherPerson = { name: "Carlos" };

      // call , apply , bind (function)
      // call -> immediate call with another person as context

      person.greeting.call(anotherPerson, "Hello");

      // apply -> immediate call with another person as context
      person.greeting.apply(anotherPerson, ["Hola"]);

      // bind -> doesn't place (invoke) the method but return you the function binded with the context
      let greetingBindedWithAnotherPerson = person.greeting.bind(anotherPerson);
      /// after 100 lines of code
      greetingBindedWithAnotherPerson("Bye");

      function Shape() {
        this.breadth = 10;
        this.length = 10;
      }

      function Rect() {
        // Shape.call(this);
        // Rect {breadth: 10, length: 10, isSquare: false}
        this.isSquare = false;
        Rect.prototype = new Shape();
      }

      //   Rect {isSquare: false}

      var rect = new Rect();
    </script>
  </head>
  <body></body>
</html>
