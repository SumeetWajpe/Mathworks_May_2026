<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="GetPosts.js"></script>
    <script>
      GetPosts(function (posts, err) {
        if (posts) {
          console.log(posts);
          // convert JSON to js
          let thePosts = JSON.parse(posts);
          let postList = document.getElementById("postList");
          for (const post of thePosts) {
            let newPostItem = document.createElement("li");
            newPostItem.innerText = post.title;
            postList.appendChild(newPostItem);
          }
        } else {
          console.log(err);
        }
      });
    </script>
  </head>
  <body>
    <h1>Post List</h1>
    <ul id="postList"></ul>
  </body>
</html>
