<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      function OnLoadHandler() {
        let theHeader = document.getElementById("header"); // DOM API
        //console.log(theHeader.innerText);
        theHeader.innerText = "Dynamic text !";
      }

      function OnClickHandler() {
        let theName = document.getElementById("txtName");
        // theName.value = "Sumeet";
        console.log(theName.value);
      }
    </script>
  </head>
  <body onload="OnLoadHandler()">
    <h1 id="header">Hello DOM !</h1>
    <label for="txtName">Enter name :</label>
    <input type="text" id="txtName" />
    <input type="button" onclick="OnClickHandler()" value="Get Name" />
  </body>
</html>
