<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      class Car {
        constructor(name = "BMW", speed = 200) {
          this.name = name;
          this.speed = speed;
        }
        accelerate() {
          return `The car ${this.name} is running @ ${this.speed} kmph `;
        }
      }

      //   let carObj = new Car();
      //   carObj.accelerate();

      class JamesBondCar extends Car {
        constructor(name, speed, canFly, canSubmerge) {
          super(name, speed);
          this.canFly = canFly;
          this.canSubmerge = canSubmerge;
        }
        accelerate() {
          return super.accelerate() + " Can Fly ? " + this.canFly;
        }
      }

      let jbc = new JamesBondCar("Aston Martin", 200, true, false);
      console.log(jbc.accelerate());

      // Loose typing / Dynamic typing
      let x = 100;
      x = "Hello";
      x = [10, true, "Hi"];
      x = true;
      x = function () {};
    </script>
  </head>
  <body></body>
</html>
